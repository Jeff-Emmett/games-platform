version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: games-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: games_platform
      POSTGRES_USER: games_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - games-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U games_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for job queues
  redis:
    image: redis:7-alpine
    container_name: games-redis
    restart: unless-stopped
    networks:
      - games-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: games-backend
    restart: unless-stopped
    environment:
      GAMES_STORAGE_PATH: /data/games
      UPLOAD_MAX_SIZE: 5368709120
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_SLUG: games-platform
    volumes:
      - games_data:/data/games
      - ./backend:/app
    networks:
      - games-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Game Installation Worker
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: games-worker
    restart: unless-stopped
    environment:
      GAMES_STORAGE_PATH: /data/games
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET}
      INFISICAL_PROJECT_SLUG: games-platform
    volumes:
      - games_data:/data/games
      - ./worker:/app
    networks:
      - games-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: https://games.jeffemmett.com/api
    container_name: games-frontend
    restart: unless-stopped
    networks:
      - games-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: games-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - games_data:/data/games:ro
    networks:
      - games-network
      - traefik-public
    depends_on:
      - backend
      - frontend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.games.rule=Host(`games.jeffemmett.com`)"
      - "traefik.http.routers.games.entrypoints=web"
      - "traefik.http.services.games.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik-public"

networks:
  games-network:
    driver: bridge
  traefik-public:
    external: true

volumes:
  postgres_data:
  games_data:
